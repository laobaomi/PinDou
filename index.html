<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>221色拼豆库存管理</title>
  <style>
    :root {
      --primary: #007aff;
      --danger: #ff3b30;
      --success: #34c759;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #f2f2f7;
      margin: 0;
      padding: 10px;
      padding-bottom: 50px;
    }

    /* 顶部固定区域 */
    .header-sticky {
      position: sticky;
      top: 0;
      background: #f2f2f7;
      z-index: 100;
      padding: 5px 0 10px 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #1c1c1e;
      font-size: 1.4rem;
      margin: 10px 0;
    }

    .status-tip {
      text-align: center;
      font-size: 0.75rem;
      color: #8e8e93;
      height: 18px;
      margin-bottom: 5px;
    }

    .status-tip.saving {
      color: var(--success);
      font-weight: bold;
    }

    .controls {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .global-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
    }

    .search-bar input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }

    /* 一行两个布局 */
    .beads-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .bead-item {
      background: white;
      padding: 10px 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .color-view {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid #eee;
    }

    .code-name {
      font-weight: bold;
      font-size: 0.9rem;
      width: 32px;
      color: #3a3a3c;
    }

    /* 计数器组合容器：确保内部元素居中且有微小间距 */
    .counter-group {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 2px;
      justify-content: flex-end;
      /* 使计数器整体向右靠齐 */
    }

    /* 修改输入框：增加宽度以容纳 5 位数 */
    .count-input {
      width: 100%;
      min-width: 55px;
      /* 关键修改：从 40px 增加到 55px，确保 10000 显示完整 */
      border: 1px solid #efeff4;
      text-align: center;
      padding: 6px 0;
      /* 略微增加上下高度，手机更易点击 */
      font-size: 0.95rem;
      border-radius: 4px;
      background: #f9f9f9;
    }

    /* 隐藏 Chrome/Safari 的默认数字上下箭头，防止挤占宽度 */
    .count-input::-webkit-outer-spin-button,
    .count-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* 按钮：调整为长方形感 */
    .btn-op {
      width: 22px;
      /* 宽度 */
      height: 30px;
      /* 高度（略微拉长，更像条状） */
      flex-shrink: 0;
      /* 强制保持宽度，不被压缩 */
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .btn-minus {
      background-color: var(--danger);
    }

    .btn-plus {
      background-color: var(--success);
    }

    @media (max-width: 400px) {
      .code-name {
        width: 28px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header-sticky">
      <h1>221色拼豆库存管理</h1>
      <div id="saveTip" class="status-tip">数据已自动保存</div>

      <div class="controls">
        <div class="global-row">
          <span>默认累加值 (+):</span>
          <input type="number" id="globalStep" value="1000" onchange="saveStepSetting(this.value)"
            style="width: 70px; border: 1px solid #ddd; padding: 4px; border-radius: 4px; text-align: center;">
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="搜索色号..." onkeyup="filterTable()">
        </div>
      </div>
    </div>

    <div class="beads-grid" id="beadsGrid"></div>
  </div>

  <script>
    const beadsData = {
      'A': ['#FEF0C9', '#FCFDD3', '#F7F4A7', '#FBE553', '#F8CF37', '#FCA24A', '#F28947', '#FCD242', '#F3955F', '#EC7C4C', '#FFD28D', '#FDA170', '#F5C074', '#F55348', '#FDFC63', '#F7FAA3', '#F3D97A', '#F2B886', '#F6777E', '#F4CA66', '#F8DB8F', '#F2F280', '#E1CBC0', '#EFEC9B', '#F2CD72', '#EBC148'],
      'B': ['#E7F42B', '#6AE849', '#A7EF7F', '#69D436', '#3BD960', '#6BD9A8', '#48A078', '#2F8C5F', '#1F4B30', '#9CD0C4', '#56702F', '#276246', '#C8E27F', '#B1E253', '#354F2C', '#C6E89B', '#90A53E', '#DFE36B', '#2DB48B', '#CFEBD5', '#225E5E', '#16373E', '#2E3221', '#F4FCA9', '#547562', '#8A6D43', '#CAD9B2', '#96DCA6', '#C6D868', '#E5FEAD', '#B3DC8D', '#96A258'],
      'C': ['#F1FDF3', '#AAF9FE', '#ABE5FB', '#4ACAF7', '#13A4D3', '#6A9FCB', '#3678CC', '#254A9A', '#334DBB', '#58ABCD', '#3CD4D5', '#152B38', '#D5E8F7', '#DFF7F9', '#46B1A9', '#255482', '#18C5E7', '#1E2537', '#278090', '#1E69A3', '#C0DBF9', '#7BA7B0', '#C7DEFE', '#A4BFDA', '#ADE2EA', '#5D9AB9', '#D1DDF3', '#B1C2E0', '#3C4E74'],
      'D': ['#B2B1EA', '#8092D0', '#3655A7', '#192879', '#B844C1', '#AB7FD8', '#8555AB', '#E3D8FA', '#CEB9F2', '#3D224B', '#BBBAE2', '#DBA1D4', '#A90D8C', '#892C94', '#392888', '#E2E0EE', '#C4CDF4', '#9964B4', '#DCBFDD', '#9D3DA9', '#A60497', '#3E4192', '#E8DEF6', '#818BD3', '#5854B5', '#D5BFF0'],
      'E': ['#F8CACD', '#F3C6E5', '#F9A0CC', '#E77BAD', '#EB5D99', '#FA287F', '#AB127A', '#F7DBE7', '#E18CE1', '#AE406F', '#F8E9E4', '#E9A1D1', '#95187C', '#F2D2B9', '#E9CAD2', '#FEF6F3', '#FAEAF7', '#F8CBEC', '#F4D0F4', '#F2E5EF', '#DEC0C2', '#C88BB5', '#9E85A2', '#FEE0FA'],
      'F': ['#FBA09D', '#ED695A', '#E94659', '#FC0927', '#EB2023', '#BD3C36', '#8F1842', '#B40830', '#E16D84', '#93573D', '#74342A', '#F53E5D', '#C84734', '#F3A3AE', '#C60E30', '#EECFD4', '#EDB1A6', '#D88553', '#BD5168', '#F2A68E', '#F4A6CD', '#F284A1', '#E34F31', '#F4C2C1', '#F6070D'],
      'G': ['#FFE7C3', '#FFD5BD', '#E3B8AF', '#E1B19A', '#F7A86F', '#F09F74', '#8F5337', '#451D13', '#E9BB87', '#C08936', '#E2C8A3', '#D8B08D', '#D49061', '#916B58', '#F3F5DF', '#E7DCC8', '#64514A', '#F4E3D9', '#E6AD5C', '#915749', '#C79175'],
      'H': ['#FDFDFD', '#FEFEFE', '#CBC9D7', '#979298', '#636267', '#38373D', '#010004', '#F3E6F0', '#E0E1D3', '#F5EFFB', '#D0CED3', '#FEFCF0', '#F4EBDA', '#DDE6F5', '#959BBB', '#2A1F1B', '#F5F3F4', '#F3F2ED', '#E9E4E0', '#97A5AE', '#F3F5E8', '#EBEBEB', '#CBCBCB'],
      'M': ['#BBC8BF', '#94A291', '#718795', '#EDE5E3', '#DDCFB4', '#D3C7A1', '#C0ACAB', '#AF939F', '#B89378', '#C1B2C7', '#977F95', '#766062', '#D4A8A5', '#CF726D', '#827883']
    };

    const grid = document.getElementById('beadsGrid');
    const savedData = JSON.parse(localStorage.getItem('beadsInventory_v4')) || {};

    // 在 script 标签最开头增加这一行，读取存过的累加值，如果没有则默认为 1000
    const savedStep = localStorage.getItem('globalStepSetting') || 1000;
    document.getElementById('globalStep').value = savedStep;

    function init() {
      Object.keys(beadsData).forEach(prefix => {
        beadsData[prefix].forEach((hex, index) => {
          const id = prefix + (index + 1);
          const count = savedData[id] || 0;

          const item = document.createElement('div');
          item.className = 'bead-item';
          item.innerHTML = `
                    <div class="color-view" style="background:${hex}"></div>
                    <div class="code-name">${id}</div>
                    <div class="counter-group">
                        <button class="btn-op btn-minus" onclick="minusPop('${id}')">-</button>
                        <input type="number" id="input-${id}" class="count-input" value="${count}" min="0" oninput="updateStorage('${id}', this.value)">
                        <button class="btn-op btn-plus" onclick="plusCount('${id}')">+</button>
                    </div>
                `;
          grid.appendChild(item);
        });
      });
    }

    // 累加全局值
    function plusCount(id) {
      const step = parseInt(document.getElementById('globalStep').value) || 0;
      const input = document.getElementById('input-' + id);
      input.value = (parseInt(input.value) || 0) + step;
      updateStorage(id, input.value);
    }

    // 弹出输入框减去指定值
    function minusPop(id) {
      const input = document.getElementById('input-' + id);
      // 弹出提示框
      const subValue = prompt(`色号 ${id} 当前库存: ${input.value}\n请输入要减去的数量:`, "");

      // 只有当用户点击“确定”且输入的是数字时才执行
      if (subValue !== null && !isNaN(subValue) && subValue !== "") {
        let current = parseInt(input.value) || 0;
        let result = current - parseInt(subValue);

        // 确保库存不会变成负数
        input.value = result < 0 ? 0 : result;

        // 记得调用你原来的保存函数
        updateStorage(id, input.value);
      }
    }

    function updateStorage(id, val) {
      let cleanVal = Math.max(0, parseInt(val) || 0);
      savedData[id] = cleanVal;

      // 将修正后的数字同步回输入框（这样用户输入 -5 或 +100 会瞬间变成 0 或 100）
      document.getElementById('input-' + id).value = cleanVal;

      localStorage.setItem('beadsInventory_v4', JSON.stringify(savedData));

      const tip = document.getElementById('saveTip');
      tip.innerText = "● 正在同步更新...";
      tip.classList.add('saving');
      clearTimeout(window.saveTimer);
      window.saveTimer = setTimeout(() => {
        tip.innerText = "数据已自动保存";
        tip.classList.remove('saving');
      }, 800);
    }

    function filterTable() {
      const filter = document.getElementById("searchInput").value.toUpperCase();
      document.querySelectorAll('.bead-item').forEach(item => {
        const code = item.querySelector('.code-name').innerText;
        item.style.display = code.includes(filter) ? "flex" : "none";
      });
    }

    function saveStepSetting(val) {
      let step = parseInt(val) || 0;
      if (step < 0) step = 0;

      document.getElementById('globalStep').value = step;

      localStorage.setItem('globalStepSetting', step);
    }

    init();
  </script>
</body>

</html>
